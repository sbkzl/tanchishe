<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>贪吃蛇游戏</title>
    <style>
        body {
            background: #1a1a1a;
            color: white;
            font-family: monospace;
            text-align: center;
            padding-top: 20px;
        }
        #game {
            display: inline-block;
            background: black;
            padding: 10px;
            border: 2px solid #666;
        }
    </style>
</head>
<body>
<h2>贪吃蛇 C 语言风格网页版</h2>
<br>
<div id="game"></div>
<p>W A S D 控制方向 | 撞到墙或自己结束</p>

<script>
    const WIDTH = 25;
    const HEIGHT = 15;
    let snake = [{x:12,y:7},{x:11,y:7},{x:10,y:7}];
    let food = {x:5,y:5};
    let dir = 'RIGHT';
    let nextDir = 'RIGHT';
    let score = 0;
    let gameOver = false;
    const gameDiv = document.getElementById('game');

    function randomFood() {
        let x = Math.floor(Math.random() * WIDTH);
        let y = Math.floor(Math.random() * HEIGHT);
        food = {x,y};
    }

    function draw() {
        let out = '';
        for(let i=0;i<WIDTH+2;i++) out+='#';
        out+='\n';

        for(let y=0;y<HEIGHT;y++){
            out+='#';
            for(let x=0;x<WIDTH;x++){
                let isSnake = false;
                if(x===snake[0].x && y===snake[0].y){
                    out+='O';
                    continue;
                }
                for(let i=1;i<snake.length;i++){
                    if(x===snake[i].x && y===snake[i].y){
                        out+='o';
                        isSnake=true;
                        break;
                    }
                }
                if(isSnake) continue;
                if(x===food.x && y===food.y) out+='F';
                else out+=' ';
            }
            out+='#\n';
        }

        for(let i=0;i<WIDTH+2;i++) out+='#';
        out+='\n\n分数：'+score;
        gameDiv.innerText = out;
    }

    function logic() {
        if(gameOver) return;
        dir = nextDir;
        let head = {...snake[0]};

        if(dir==='UP') head.y--;
        if(dir==='DOWN') head.y++;
        if(dir==='LEFT') head.x--;
        if(dir==='RIGHT') head.x++;

        if(head.x<0||head.x>=WIDTH||head.y<0||head.y>=HEIGHT){
            gameOver=true;
            alert('游戏结束！得分：'+score);
            return;
        }

        for(let b of snake){
            if(b.x===head.x && b.y===head.y){
                gameOver=true;
                alert('游戏结束！得分：'+score);
                return;
            }
        }

        snake.unshift(head);

        if(head.x===food.x && head.y===food.y){
            score+=10;
            randomFood();
        }else{
            snake.pop();
        }
    }

    document.addEventListener('keydown',e=>{
        if(gameOver) return;
        switch(e.key){
            case 'w': case 'W': if(dir!=='DOWN') nextDir='UP'; break;
            case 's': case 'S': if(dir!=='UP') nextDir='DOWN'; break;
            case 'a': case 'A': if(dir!=='RIGHT') nextDir='LEFT'; break;
            case 'd': case 'D': if(dir!=='LEFT') nextDir='RIGHT'; break;
        }
    });

    function loop(){
        logic();
        draw();
        setTimeout(loop,150);
    }

    randomFood();
    loop();
</script>
</body>
</html>
