<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>超大屏贪吃蛇</title>
    <style>
        body {
            background: #000;
            color: #39ff14;
            font-family: "Consolas", monospace;
            text-align: center;
            margin-top: 20px;
        }
        #box {
            font-size: 22px;
            line-height: 1.25;
            white-space: pre;
        }
    </style>
</head>
<body>
    <h1>超大空间贪吃蛇</h1>
    <div id="box"></div>
    <p style="font-size:18px">WASD 控制 | 超大地图不挤不卡</p>

<script>
// 改成超大地图
const W = 45;
const H = 22;
let gameOver = false;
let score = 0;

// 蛇初始位置居中，绝对不自撞
let snake = [
    {x: 22, y: 11},
    {x: 21, y: 11},
    {x: 20, y: 11}
];
let dir = "RIGHT";
let nextDir = "RIGHT";
let food;

// 食物绝对不在蛇身上
function createFood() {
    while(true) {
        let x = Math.floor(Math.random() * W);
        let y = Math.floor(Math.random() * H);
        let ok = true;
        for(let p of snake) {
            if(p.x === x && p.y === y) {
                ok = false;
                break;
            }
        }
        if(ok) {
            food = {x, y};
            break;
        }
    }
}

// 绘制大地图
function render() {
    let str = "";
    for(let i = 0; i < W + 2; i++) str += "#";
    str += "\n";

    for(let y = 0; y < H; y++) {
        str += "#";
        for(let x = 0; x < W; x++) {
            let isBody = false;
            if(x === snake[0].x && y === snake[0].y) {
                str += "●";
                continue;
            }
            for(let i = 1; i < snake.length; i++) {
                if(snake[i].x === x && snake[i].y === y) {
                    str += "○";
                    isBody = true;
                    break;
                }
            }
            if(isBody) continue;
            if(x === food.x && y === food.y) {
                str += "★";
            } else {
                str += " ";
            }
        }
        str += "#\n";
    }
    for(let i = 0; i < W + 2; i++) str += "#";
    str += `\n游戏分数：${score}`;

    document.getElementById("box").innerText = str;
}

function update() {
    if(gameOver) return;
    dir = nextDir;

    let head = {...snake[0]};
    switch(dir) {
        case "UP": head.y--; break;
        case "DOWN": head.y++; break;
        case "LEFT": head.x--; break;
        case "RIGHT": head.x++; break;
    }

    // 撞墙
    if(head.x < 0 || head.x >= W || head.y < 0 || head.y >= H) {
        gameOver = true;
        alert(`游戏结束！最终分数：${score}`);
        return;
    }

    // 撞身体
    for(let p of snake) {
        if(p.x === head.x && p.y === head.y) {
            gameOver = true;
            alert(`游戏结束！最终分数：${score}`);
            return;
        }
    }

    snake.unshift(head);

    if(head.x === food.x && head.y === food.y) {
        score += 10;
        createFood();
    } else {
        snake.pop();
    }
}

// 按键禁止反向
document.addEventListener("keydown", e => {
    if(gameOver) return;
    let key = e.key.toLowerCase();
    if(key === "w" && dir !== "DOWN") nextDir = "UP";
    if(key === "s" && dir !== "UP") nextDir = "DOWN";
    if(key === "a" && dir !== "RIGHT") nextDir = "LEFT";
    if(key === "d" && dir !== "LEFT") nextDir = "RIGHT";
});

// 流畅速度
function gameLoop() {
    update();
    render();
    if(!gameOver) {
        setTimeout(gameLoop, 140);
    }
}

createFood();
render();
gameLoop();
</script>
</body>
</html>
